name: Site compatibility report
description: Report a site that looks misclassified or broken in Obscura
title: "[compat] "
labels:
  - compatibility
body:
  - type: input
    id: url
    attributes:
      label: Site URL
      placeholder: https://example.com
    validations:
      required: true
  - type: dropdown
    id: expected_engine
    attributes:
      label: What engine should have been used?
      options:
        - obscura
        - chrome / hybrid instead
    validations:
      required: true
  - type: textarea
    id: check_output
    attributes:
      label: Compatibility check output
      description: Paste the output of `check` or `check --json`
      render: text
    validations:
      required: true
  - type: textarea
    id: symptoms
    attributes:
      label: Symptoms observed
      description: Missing styles, collapsed layout, broken clicks, missing forms, anti-bot flow, etc.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: Anything else that may help reproduce or refine heuristics
